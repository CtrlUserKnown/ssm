name: build

# Produces the Linux release binaries and attaches them to a GitHub Release. Run
# it manually (workflow_dispatch) or by pushing a version tag like `v0.1.0`.
#
# macOS is deliberately NOT built here. Without an Apple Developer account we
# can't notarize in CI, and the stable self-signed identity that keeps biometric
# unlock working lives only in the maintainer's local keychain. So the two
# darwin arches are built + signed locally and uploaded to the same Release with
# `scripts/release-macos.sh` (see the "Releasing" section of the README).

on:
  workflow_dispatch:
  push:
    tags: [ "v*" ]

permissions:
  contents: write   # needed to attach binaries to a Release on tag push

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # macOS targets are built locally — see scripts/release-macos.sh.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable, ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # The Linux keyring backend (dbus-secret-service) links libdbus at build time.
      - name: Install Secret Service build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Build release binary
        env:
          # Bake the pushed tag into the binary so `ssm --version` and the
          # self-updater's version check are correct even on a shallow checkout.
          # Empty on non-tag (manual) runs, so build.rs falls back to git describe.
          SSM_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/ssm"
          test -f "$bin"
          dist="ssm-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "$bin" "$dist/"
          cp README.md LICENSE "$dist/" 2>/dev/null || true
          tar -czf "$dist.tar.gz" "$dist"
          shasum -a 256 "$dist.tar.gz" > "$dist.tar.gz.sha256" 2>/dev/null \
            || sha256sum "$dist.tar.gz" > "$dist.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssm-${{ matrix.target }}
          path: |
            ssm-${{ matrix.target }}.tar.gz
            ssm-${{ matrix.target }}.tar.gz.sha256

      - name: Attach to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ssm-${{ matrix.target }}.tar.gz
            ssm-${{ matrix.target }}.tar.gz.sha256
